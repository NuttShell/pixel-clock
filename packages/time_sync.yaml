sensor:
  - platform: template
    name: "Последняя синхронизация (timestamp)"
    id: last_sync_timestamp
    entity_category: diagnostic
    icon: mdi:clock-check
    accuracy_decimals: 0
    lambda: |-
      return 0;

  - platform: template
    name: "Качество синхронизации"
    id: time_quality
    entity_category: diagnostic
    icon: mdi:signal
    unit_of_measurement: "%"
    lambda: |-
      auto now = id(net_time).now();
      if (!now.is_valid()) return 0.0;
      return 100.0;

# ============================================
# 2. Текстовые сенсоры статуса
# ============================================
text_sensor:
  - platform: template
    name: "Статус времени"
    id: time_sync_status_text
    entity_category: diagnostic
    icon: mdi:network-pos
    lambda: |-
      if (id(net_time).now().is_valid()) {
        auto now = id(net_time).now();
        char buffer[20];
        sprintf(buffer, "Синхр: %02d:%02d", now.hour, now.minute);
        return std::string(buffer);
      } else {
        return {"Нет синхронизации"};
      }
    update_interval: 30s

  - platform: template
    name: "Часовой пояс"
    id: timezone_display
    entity_category: diagnostic
    icon: mdi:airplane-time
    lambda: |-
      return {"Asia/Tomsk"};

# ============================================
# 3. Бинарный сенсор статуса
# ============================================
binary_sensor:
  - platform: template
    name: "Время синхронизировано"
    id: time_sync_status
    device_class: connectivity
    entity_category: diagnostic
    lambda: |-
      return id(net_time).now().is_valid();

# ============================================
# 4. Кнопки управления
# ============================================
button:
  - platform: template
    name: "Синхронизировать время"
    id: force_time_sync
    icon: mdi:sync
    entity_category: config
    on_press:
      then:
        - logger.log:
            format: "Запуск синхронизации..."
            level: INFO
            tag: "time_sync"
        - lambda: |-
            id(net_time).call_setup();
        - delay: 3s
        - lambda: |-
            if (id(net_time).now().is_valid()) {
              ESP_LOGI("time_sync", "Синхронизация успешна");
              id(time_sync_status).publish_state(true);
            } else {
              ESP_LOGW("time_sync", "Синхронизация не удалась");
              id(time_sync_status).publish_state(false);
            }
        - ds1307.write_time:

  - platform: template
    name: "Сброс RTC DS1307"
    id: reset_rtc
    icon: mdi:clock-remove
    entity_category: config
    disabled_by_default: true
    on_press:
      then:
        - logger.log:
            format: "Сброс RTC DS1307..."
            level: WARN
            tag: "rtc"
        - ds1307.write_time:

# ============================================
# 5. Скрипты
# ============================================
script:
  - id: check_and_sync_time
    mode: restart
    then:
      - lambda: |-
          auto now = id(net_time).now();
          if (!now.is_valid()) {
            ESP_LOGW("time_script", "Время не синхронизировано...");
            id(net_time).call_setup();
            delay(2000);
          } else {
            ESP_LOGI("time_script", "Время: %04d-%02d-%02d %02d:%02d:%02d",
                     now.year, now.month, now.day,
                     now.hour, now.minute, now.second);
          }

  - id: display_time_info
    mode: single
    then:
      - lambda: |-
          auto now = id(net_time).now();
          if (now.is_valid()) {
            ESP_LOGI("time_info", "=== Время ===");
            ESP_LOGI("time_info", "%04d-%02d-%02d %02d:%02d:%02d",
                     now.year, now.month, now.day,
                     now.hour, now.minute, now.second);
          }

# ============================================
# 6. Автоматизации
# ============================================
wifi:
  on_connect:
    then:
      - logger.log:
          format: "WiFi подключен, синхронизируем время..."
          level: INFO
          tag: "wifi"
      - script.execute: check_and_sync_time
      - delay: 2s
      - ds1307.write_time:
      - lambda: id(time_sync_status).publish_state(true);

  on_disconnect:
    then:
      - logger.log:
          format: "WiFi отключен"
          level: WARN
          tag: "wifi"
      - lambda: id(time_sync_status).publish_state(false);

interval:
  - interval: 6h
    then:
      - script.execute: check_and_sync_time
  
  - interval: 10s
    then:
      - lambda: |-
          id(time_sync_status).publish_state(id(net_time).now().is_valid());
