button:
  - platform: template
    name: "Sync NTP Time"
    id: ntp_sync_button
    icon: mdi:sync-circle
    entity_category: config
    on_press:
      then:
        - lambda: |-
            id(net_time).update();
        - delay: 2s
        - ds1307.write_time:
        - lambda: |-
            id(rgb8x32)->set_display_on();
            id(rgb8x32)->force_screen("wait", 1);

script:
  - id: force_ntp_sync
    then:
      - lambda: |-
          id(net_time).update();
      - delay: 2s
      - ds1307.write_time:

api:
  services:
    - service: sync_ntp_time
      then:
        - script.execute: force_ntp_sync
